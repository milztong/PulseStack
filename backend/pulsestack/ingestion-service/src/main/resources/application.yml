spring:
  application:
    name: ingestion-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulsestack}
    username: ${DB_USER:pulsestack}
    password: ${DB_PASSWORD:pulsestack_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway übernimmt das Schema – JPA nur lesen
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

pulsestack:
  ingestion:
    poll-interval-hours: 5          # Alle 5h alle Channels pollen
    max-channels: 25
    dedup-ttl-hours: 24             # Redis TTL für gesehene IDs
    rich-preview-limit: 3           # Nur Top-3 bekommen Thumbnail-Fetch

logging:
  level:
    dev.pulsestack: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
