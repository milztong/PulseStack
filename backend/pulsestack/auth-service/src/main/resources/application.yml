spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/pulsestack
    username: pulsestack
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_auth

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

pulsestack:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars}
    expiration-ms: 86400000  # 24 hours

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    dev.pulsestack: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
