spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

pulsestack:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    dev.pulsestack: INFO
    root: WARN
